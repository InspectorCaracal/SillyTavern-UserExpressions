<div class="expression_list_item interactable" data-expression="{{expression}}" data-filename="{{fileName}}" tabindex="0">
    <div class="expression_list_buttons">
        <div class="menu_button expression_list_upload interactable" title="Upload image" tabindex="0" role="button">
            <i class="fa-solid fa-upload"></i>
        </div>
        <div class="menu_button expression_list_delete interactable" title="Delete image" tabindex="0" role="button">
            <i class="fa-solid fa-trash"></i>
        </div>
    </div>
    <div class="expression_list_title">
        <span>{{expression}}</span>
    </div>
    <div class="expression_list_image_container" title="{{expression}}">
        <img class="expression_list_image" src="{{imageSrc}}" alt="{{expression}}" loading="lazy">
    </div>
</div>
