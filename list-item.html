<div class="expression_list_item user-expression-item {{#if isActive}}active{{/if}}" data-expression="{{expression}}" data-filename="{{fileName}}">
    <div class="expression_list_image">
        <img src="{{imageSrc}}" alt="{{expression}}" loading="lazy" />
    </div>
    <div class="expression_list_info">
        <div class="expression_list_label">{{expression}}</div>
        <div class="expression_list_actions">
            <button class="expression_list_set menu_button" title="Set expression">
                <i class="fa-solid fa-check"></i>
            </button>
            <button class="expression_list_delete menu_button" title="Delete sprite">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>
    </div>
</div>
